name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: api/package-lock.json
    
    - name: Install API dependencies
      run: cd api && npm ci
    
    - name: Build HTML module
      run: node create-html-module.js
    
    - name: Deploy API to Cloudflare Workers (Production)
      run: cd api && npx wrangler deploy --env production
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    
    - name: Log deployment status
      run: |
        echo "✅ Deployment complete!"
        echo "API deployed to: https://focusbro.net"
        echo "Check https://dash.cloudflare.com for detailed logs"
    
    - name: Verify deployment
      run: |
        sleep 5
        curl -s -I https://focusbro.net/ | head -3 || echo "⏳ Deployment pending; check Cloudflare dashboard"
