name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: api/package-lock.json
    
    - name: Install API dependencies
      run: cd api && npm ci
    
    - name: Build HTML module
      run: node create-html-module.js
    
    - name: Deploy API to Cloudflare Workers (Production)
      id: deploy
      run: |
        cd api
        # Debug: Check what secrets are available
        echo "🔍 Checking available secrets..."
        echo "CLOUDFLARE_API_TOKEN length: ${#CLOUDFLARE_API_TOKEN}"
        echo "CLOUDFLARE_API length: ${#CLOUDFLARE_API}"
        echo "CF_API_TOKEN length: ${#CF_API_TOKEN}"
        
        # Try multiple possible secret names
        if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
          echo "✅ Using CLOUDFLARE_API_TOKEN"
          export CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN"
        elif [ -n "$CLOUDFLARE_API" ]; then
          echo "✅ Using CLOUDFLARE_API (mapping to CLOUDFLARE_API_TOKEN)"
          export CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API"
        elif [ -n "$CF_API_TOKEN" ]; then
          echo "✅ Using CF_API_TOKEN (mapping to CLOUDFLARE_API_TOKEN)"
          export CLOUDFLARE_API_TOKEN="$CF_API_TOKEN"
        else
          echo "❌ No Cloudflare API token found in any expected secret name"
          echo "Expected secret names: CLOUDFLARE_API_TOKEN, CLOUDFLARE_API, or CF_API_TOKEN"
          echo "Please ensure one of these secrets is set in GitHub Actions"
          exit 1
        fi
        
        echo "� Testing CLOUDFLARE_API_TOKEN..."
        curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          -H "Content-Type: application/json" | jq -r '.result.status // "INVALID"'
        
        echo "🔍 Checking account access..."
        curl -s "https://api.cloudflare.com/client/v4/accounts" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          -H "Content-Type: application/json" | jq -r '.result[]?.id // "NO_ACCOUNTS"'
        
        echo "🚀 Starting deployment..."
        npx wrangler deploy --env production 2>&1 | tee deploy.log
        DEPLOY_EXIT=$?
        echo "📋 Deployment log:"
        cat deploy.log
        exit $DEPLOY_EXIT
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_API: ${{ secrets.CLOUDFLARE_API }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      continue-on-error: false
    
    - name: Purge Cloudflare Cache
      run: |
        echo "🧹 Purging Cloudflare cache for focusbro.net..."
        
        # Get zone ID for focusbro.net
        ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=focusbro.net" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          -H "Content-Type: application/json" | jq -r '.result[0].id')
        
        if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
          echo "❌ Could not find zone ID for focusbro.net"
          echo "Available zones:"
          curl -s "https://api.cloudflare.com/client/v4/zones" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[] | "\(.name): \(.id)"'
          exit 1
        fi
        
        echo "Found zone ID: $ZONE_ID"
        
        # Purge everything (or specific URLs if needed)
        PURGE_RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"purge_everything": true}')
        
        if echo "$PURGE_RESPONSE" | jq -e '.success' > /dev/null; then
          echo "✅ Cache purged successfully"
        else
          echo "❌ Cache purge failed:"
          echo "$PURGE_RESPONSE"
          # Don't fail the build for cache purge issues
        fi
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_API: ${{ secrets.CLOUDFLARE_API }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    
    - name: Check deployment secret
      if: failure()
      run: |
        echo "❌ Deployment failed - CLOUDFLARE_API_TOKEN secret is not set"
        echo ""
        echo "📋 To fix this:"
        echo "1. Go to: https://github.com/adrper79-dot/focusbro/settings/secrets/actions"
        echo "2. Verify that a secret named 'CLOUDFLARE_API_TOKEN' exists"
        echo "3. If it doesn't exist, create it:"
        echo "   - Name: CLOUDFLARE_API_TOKEN"
        echo "   - Value: <your Cloudflare API token>"
        echo ""
        echo "4. Get your Cloudflare API token from:"
        echo "   - https://dash.cloudflare.com/profile/api-tokens"
        echo "   - Click 'Create Token' → 'Edit Cloudflare Workers'"
        echo ""
        echo "Current secret names available: (if any would be listed here...)"
        exit 1
    
    - name: Log deployment status
      run: |
        echo "✅ Deployment complete!"
        echo "API deployed to: https://focusbro.net"
        echo "Check https://dash.cloudflare.com for detailed logs"
    
    - name: Verify deployment
      run: |
        echo "⏳ Waiting for deployment and cache purge to propagate..."
        sleep 10
        
        # Check if the updated title is present
        if curl -s https://focusbro.net/ | grep -q "FocusBro — Your Productivity Co-Pilot"; then
          echo "✅ Page updated successfully!"
        else
          echo "⚠️  Page may still be updating. Check manually: https://focusbro.net/"
          echo "Current title:"
          curl -s https://focusbro.net/ | grep -o "<title>.*</title>" || echo "Could not fetch title"
        fi
