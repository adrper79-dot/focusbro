name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: api/package-lock.json
    
    - name: Install API dependencies
      run: cd api && npm ci
    
    - name: Build HTML module
      run: node create-html-module.js
    
    - name: Deploy API to Cloudflare Workers (Production)
      id: deploy
      run: |
        cd api
        # Try with the secret from environment
        if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
          npx wrangler deploy --env production
        else
          echo "❌ CLOUDFLARE_API_TOKEN is empty - cannot deploy"
          echo "Please ensure the CLOUDFLARE_API_TOKEN secret is set in GitHub Actions"
          exit 1
        fi
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      continue-on-error: false
    
    - name: Check deployment secret
      if: failure()
      run: |
        echo "❌ Deployment failed - CLOUDFLARE_API_TOKEN secret is not set"
        echo ""
        echo "📋 To fix this:"
        echo "1. Go to: https://github.com/adrper79-dot/focusbro/settings/secrets/actions"
        echo "2. Verify that a secret named 'CLOUDFLARE_API_TOKEN' exists"
        echo "3. If it doesn't exist, create it:"
        echo "   - Name: CLOUDFLARE_API_TOKEN"
        echo "   - Value: <your Cloudflare API token>"
        echo ""
        echo "4. Get your Cloudflare API token from:"
        echo "   - https://dash.cloudflare.com/profile/api-tokens"
        echo "   - Click 'Create Token' → 'Edit Cloudflare Workers'"
        echo ""
        echo "Current secret names available: (if any would be listed here...)"
        exit 1
    
    - name: Log deployment status
      run: |
        echo "✅ Deployment complete!"
        echo "API deployed to: https://focusbro.net"
        echo "Check https://dash.cloudflare.com for detailed logs"
    
    - name: Verify deployment
      run: |
        sleep 5
        curl -s -I https://focusbro.net/ | head -3 || echo "⏳ Deployment pending; check Cloudflare dashboard"
