name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: api/package-lock.json
    
    - name: Install API dependencies
      run: cd api && npm ci
    
    - name: Build HTML module
      run: node create-html-module.js
    
    - name: Deploy API to Cloudflare Workers (Production)
      id: deploy
      run: |
        echo "DEBUG: Check env"
        env | grep -i cloudflare || echo "No CLOUDFLARE vars found"
        echo "DEBUG: Running wrangler..."
        cd api && npx wrangler deploy --env production
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      continue-on-error: true
    
    - name: Check deployment secret
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo "CLOUDFLARE_API_TOKEN secret status: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}"
        echo ""
        echo "If secret is not set, add it in GitHub:"
        echo "1. Go to: https://github.com/adrper79-dot/focusbro/settings/secrets/actions"
        echo "2. Create new secret: CLOUDFLARE_API_TOKEN"
        echo "3. Get token from: https://dash.cloudflare.com/profile/api-tokens"
        echo "4. Required permission: Edit Cloudflare Workers"
        exit 1
    
    - name: Log deployment status
      run: |
        echo "✅ Deployment complete!"
        echo "API deployed to: https://focusbro.net"
        echo "Check https://dash.cloudflare.com for detailed logs"
    
    - name: Verify deployment
      run: |
        sleep 5
        curl -s -I https://focusbro.net/ | head -3 || echo "⏳ Deployment pending; check Cloudflare dashboard"
