name: FocusBro API Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'api/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'api/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: api/package-lock.json
    
    - name: Install dependencies
      run: cd api && npm ci
    
    - name: Run linter
      run: cd api && npm run lint
    
    - name: Run tests
      run: cd api && npm test
    
    - name: Generate coverage report
      if: matrix.node-version == '18.x'
      run: cd api && npm run test:coverage
    
    - name: Upload coverage
      if: matrix.node-version == '18.x'
      uses: codecov/codecov-action@v3
      with:
        files: ./api/coverage/coverage-final.json
        flags: api
        name: api-coverage

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security audit
      run: cd api && npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Check for hardcoded secrets
      run: |
        cd api
        ! grep -r "sk_live\|sk_test\|whsec_" src/ || echo "❌ Hardcoded secrets found!"
        ! grep -r "password.*=.*['\"]" src/ || echo "⚠️ Potential hardcoded passwords"

  deploy:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: api/package-lock.json
    
    - name: Install dependencies
      run: cd api && npm ci
    
    - name: Deploy to Cloudflare Workers (Production)
      run: cd api && npm run deploy -- --env production
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    
    - name: Verify Deployment
      run: curl -I https://focusbro.net/ 2>&1 | head -5 || echo "Deployment pending; check Cloudflare dashboard"
