name = "focusbro"
type = "service"
main = "src/index.js"
compatibility_date = "2024-04-01"

# Environment variables
env.production.routes = [
  { pattern = "api.focusbro.dev/*", zone_name = "focusbro.dev" }
]

env.staging.routes = [
  { pattern = "api-staging.focusbro.dev/*", zone_name = "focusbro.dev" }
]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "focusbro"
database_id = "YOUR_DATABASE_ID"  # Replace with actual D1 database ID

# Environment-specific bindings can be set in wrangler configuration or .dev.vars/.env files
# For local development with wrangler dev:
#   Create .dev.vars file with: DATABASE_ID=your_local_db_id

# Analytics Engine (optional, for tracking analytics)
[[analytics_engine_datasets]]
binding = "ANALYTICS"

# Durable Objects (optional, for real-time features)
[[durable_objects.bindings]]
name = "NOTIFICATIONS"
class_name = "NotificationDO"
script_name = "focusbro"

# Routes
[[routes]]
pattern = "api.focusbro.dev/*"
zone_name = "focusbro.dev"

[[routes]]
pattern = "api-staging.focusbro.dev/*"
zone_name = "focusbro.dev"

# Build configuration
[build]
command = "npm install"
cwd = "./workers"

# Observe configuration for logging
[observability]
enabled = true

# Limits
[limits]
cpu_ms = 50000  # 50 second timeout

# Dev configuration for local development
[env.development]
name = "focusbro-dev"
routes = [
  { pattern = "localhost:8787/*" }
]

# Additional settings
env.staging.vars = { ENVIRONMENT = "staging" }
env.production.vars = { ENVIRONMENT = "production" }
