name = "focusbro"
compatibility_date = "2024-03-24"
main = "api/src/index.js"
site = { bucket = "public" }

# Cloudflare D1 Database (SQLite)
[[d1_databases]]
binding = "DB"
database_name = "focusbro"
database_id = "placeholder-db-id"

# Cloudflare KV Store (for user data blobs)
[[kv_namespaces]]
binding = "KV"
id = "placeholder-kv-id"
preview_id = "placeholder-kv-preview-id"

# Environment-specific config
[env.production]
d1_databases = [{ binding = "DB", database_id = "2ac20b08-66e3-4abd-92de-f0e6380bdad0", database_name = "focusbro" }]
kv_namespaces = [{ binding = "KV", id = "60c1852cd70f4999a380b9ea290fccb3", preview_id = "60c1852cd70f4999a380b9ea290fccb3" }]
vars = { ENV = "production", API_ORIGIN = "https://focusbro-production.adrper79.workers.dev", JWT_SECRET = "focusbro-secret-key-prod-2024" }

[env.development]
vars = { ENV = "development", API_ORIGIN = "http://localhost:8787", JWT_SECRET = "focusbro-secret-key-dev" }
