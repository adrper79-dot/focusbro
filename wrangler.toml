name = "focusbro"
compatibility_date = "2024-03-24"
main = "api/src/index.js"
workers_dev = true
preview_urls = true
account_id = "a1c8a33cbe8a3c9e260480433a0dbb06"

# Note: Removed 'site' config - Worker handles all routes including static HTML serving
# This prevents conflicts between Worker routes and static file serving

# Cloudflare D1 Database (SQLite)
[[d1_databases]]
binding = "DB"
database_name = "focusbro-db"
database_id = "f6b1685b-a879-4d42-9c23-a30da614be01"

# Cloudflare KV Store (for user data caching)
[[kv_namespaces]]
binding = "KV_CACHE"
id = "732d985fd2b84650aa828f7982ba0f87"
preview_id = "732d985fd2b84650aa828f7982ba0f87"

# Environment-specific config
[env.production]
routes = [
  { pattern = "focusbro.net/*", zone_name = "focusbro.net" },
  { pattern = "*.focusbro.net/*", zone_name = "focusbro.net" }
]
d1_databases = [{ binding = "DB", database_id = "f6b1685b-a879-4d42-9c23-a30da614be01", database_name = "focusbro-db" }]
kv_namespaces = [{ binding = "KV_CACHE", id = "732d985fd2b84650aa828f7982ba0f87", preview_id = "732d985fd2b84650aa828f7982ba0f87" }]
vars = { ENV = "production", API_ORIGIN = "https://focusbro.net", JWT_SECRET = "focusbro-secret-key-prod-2024" }

[env.development]
vars = { ENV = "development", API_ORIGIN = "http://localhost:8787", JWT_SECRET = "focusbro-secret-key-dev" }
